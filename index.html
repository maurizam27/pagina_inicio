    <script src="script.js"></script>
    <script>
    let timer;
    let isRunning = false;
    let timeLeft = 50 * 60;

    function updateDisplay() {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        document.getElementById('timer-display').innerText = 
            `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }

    function startTimer() {
    if (!isRunning) {
        isRunning = true;
        // Cambiar color a un tono suave de acento cuando está corriendo
        document.getElementById('timer-display').style.color = '#63b3ed'; 
        timer = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
            } else {
                clearInterval(timer);
                isRunning = false;
                document.getElementById('timer-display').style.color = '#e2e8f0';
                alert("¡Tiempo cumplido!");
            }
        }, 1000);
    }
}

    function resetTimer() {
        clearInterval(timer);
        isRunning = false;
        timeLeft = 50 * 60;
        updateDisplay();
    }
</script>
