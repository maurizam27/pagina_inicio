<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Iconos vectoriales gratuitos -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

   <div class="dashboard-container">

       <header class="main-header">
    <div id="clock">00:00</div>
    <div id="greeting">¡Hola, Mauricio!</div>
    <div id="date-display"></div>
    <div class="search-box">
        <form action="https://www.google.com/search" method="get">
            <input type="text" name="q" placeholder="Buscar en Google..." autofocus autocomplete="off">
        </form>
    </div>
</header>
        
        <main class="dashboard-grid">

            <section class="card widget-youtube">
                <h3><i class='bx bx-music'></i> Playlist YT</h3>
                <div class="media-container">
                    <p style="color: #718096; font-size: 0.9rem;">Espacio para música...</p>
                </div>
            </section>

            <section class="card widget-pomodoro">
                <h3><i class='bx bx-timer'></i> Pomodoro</h3>
                <div class="pomodoro-container">
                    <p style="color: #718096; font-size: 0.9rem;">Próximamente...</p>
                </div>
            </section>

            <section class="card apps-1">
                <h3><i class='bx bx-book-bookmark'></i> Obligaciones</h3>
                <div class="icon-group">
                    <a href="https://paideia.pucp.edu.pe" target="_blank" class="tooltip-link">
                        <img src="pucp.jpg" alt="Paideia">
                        <span class="tooltip-text">Paideia</span>
                    </a>
                    <a href="https://eros.pucp.edu.pe" target="_blank" class="tooltip-link">
                        <img src="pucp.jpg" alt="Campus Virtual">
                        <span class="tooltip-text">Campus Virtual</span>
                    </a>
                    <a href="https://drive.google.com/drive/u/0/folders/1VfQCCS5TWt4oucExGZIlXQKY1pFchfNx" target="_blank" class="tooltip-link">
                        <img src="drive.svg" alt="Google Drive">
                        <span class="tooltip-text">Banco ASIME</span>
                    </a>
                    <a href="https://maurizam27.github.io/Malla-/" target="_blank" class="tooltip-link">
                        <img src="pucp.jpg" alt="Malla Interactiva">
                        <span class="tooltip-text">Malla Interactive</span>
                    </a>
                </div>
            </section>

            <section class="card apps-2">
                <h3><i class='bx bx-code-block'></i> Creación</h3>
                <div class="icon-group">
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                </div>
            </section>

            <section class="card apps-3">
                <h3><i class='bx bx-party'></i> Chill & Media</h3>
                <div class="icon-group">
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                </div>
            </section>

            <section class="card apps-4">
                <h3><i class='bx bx-grid-alt'></i> APPS 4</h3>
                <div class="icon-group">
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                </div>
            </section>

            <section class="card widget-calendar">
                <h3><i class='bx bx-calendar'></i> Mi Agenda</h3>
                <div class="calendar-container">
                    <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FLima&showPrint=0&showTitle=0&showNav=0&showCalendars=0&showTz=0&mode=AGENDA&src=bXphbWJyYW5vcnViaW5vc0BnbWFpbC5jb20&color=%23039be5" style="border-width:0" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>        
                </div>
            </section>

        </main>
    </div>

    <!-- Conexión con la lógica JS -->
    <script src="script.js"></script>
</body>
</html>
