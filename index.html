<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startpage Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <!-- Iconos vectoriales gratuitos -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="dashboard-container">
        
        <!-- HEADER: Reloj, Saludo y Buscador -->
        <header class="main-header">
            <div id="clock">00:00</div>
            <div id="greeting">¡Hola!</div>
            <div id="date-display"></div> 
            
            <div class="search-box">
                <form action="https://www.google.com/search" method="get">
                    <input type="text" name="q" placeholder="Buscar en Google..." autofocus autocomplete="off">
                </form>
            </div>
        </header>

        <!-- GRID HORIZONTAL DE 3 PILARES -->
        <main class="dashboard-grid">

            <!-- Bloque 1: Obligaciones -->
            <section class="card">
                <h3><i class='bx bx-book-bookmark'></i> Obligaciones</h3>
                <div class="icon-group">
<!-- agregar mas paginas despues de las pruenas -->

            <a href="https://paideia.pucp.edu.pe" target="_blank" class="tooltip-link">
            <img src="pucp.jpg" alt="Paideia">
            <span class="tooltip-text">Paideia</span>
        </a>

        <a href="https://eros.pucp.edu.pe" target="_blank" class="tooltip-link">
            <img src="pucp.jpg" alt="Campus Virtual">
            <span class="tooltip-text">Campus Virtual</span>
        </a>

        <a href="https://drive.google.com/drive/u/0/folders/1VfQCCS5TWt4oucExGZIlXQKY1pFchfNx" target="_blank" class="tooltip-link">
            <img src="drive.svg" alt="Google Drive">
            <span class="tooltip-text">Banco ASIME</span>
        </a>
                    
        <a href="https://maurizam27.github.io/Malla-/" target="_blank" class="tooltip-link">
            <img src="pucp.jpg" alt="Malla Interactiva">
            <span class="tooltip-text">Malla Interactiva</span>
        </a>
                    
<!-- agregar mas paginas despues de las pruenas -->

                    
                </div>
</section>
            <!-- INICIO DEL NUEVO BLOQUE PROPIO PARA EL CALENDARIO -->
<section class="card widget-calendar">
    <h3><i class='bx bx-calendar'></i> Mi Agenda</h3>
    <div class="calendar-container">
        
        <!-- Aquí pegas el iframe correcto de Google cuando estés en la PC -->
        <iframe src="https://calendar.google.com/calendar/embed?height=600&wkst=1&ctz=America%2FLima&showPrint=0&showTitle=0&showNav=0&showCalendars=0&showTz=0&src=bXphbWJyYW5vcnViaW5vc0BnbWFpbC5jb20&color=%23039be5" style="border-width:0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        
    </div>
</section>


            <!-- Bloque 2: Creación -->
            <section class="card">
                <h3><i class='bx bx-code-block'></i> Creación</h3>
                <div class="icon-group">
                    <!-- Aquí colocarás GitHub, IAs, Canva, LinkedIn, etc. -->
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                </div>
            </section>

            <!-- Bloque 3: Chill & Media -->
            <section class="card">
                <h3><i class='bx bx-party'></i> Chill & Media</h3>
                <div class="icon-group">
                    <!-- Aquí colocarás redes, streaming, YouTube, etc. -->
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                    <a href="#" title="Ejemplo"><i class='bx bx-link-alt'></i></a>
                </div>
            </section>

        </main>
    </div>

    <!-- Conexión con la lógica JS -->
    <script src="script.js"></script>
</body>
</html>
